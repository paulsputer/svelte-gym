[tools]
node = "24.9.0"
pnpm = "10.22.0"

# Development
[tasks.dev]
description = "Start development server"
run = "pnpm run dev"

# Production Preview
[tasks.preview]
description = "View the production build locally"
run = "pnpm run preview"

[tasks.view]
description = "Alias for preview"
run = "pnpm run preview"

# Build
[tasks.build]
description = "Build the project for production"
run = "pnpm run build"

# Lint
[tasks.lint]
description = "Run linter (eslint + prettier)"
run = """
pnpm run lint:api
pnpm exec eslint .
pnpm exec prettier --check .
"""

[tasks."lint:api"]
description = "Run custom API parity check"
run = "pnpm exec node scripts/lint-api-sync.js"

[tasks."lint:verbose"]
description = "Run linter with section headers"
run = """
echo '=== ESLint ==='
pnpm exec eslint .
echo '\n=== Prettier ==='
pnpm exec prettier --check .
"""

[tasks."lint:fix:prettier"]
description = "Auto-fix prettier issues"
run = """
pnpm run format
"""

[tasks."lint:fix:eslint"]
description = "Auto-fix eslint issues"
run = """
pnpm exec eslint . --fix
"""

# Test
[tasks.test]
description = "Run all tests (unit + e2e)"
run = """
pnpm run test:unit
pnpm exec playwright test
"""

# Publish
[tasks.publish]
description = "Publish svelte-gym to npm"
run = """
pnpm run build
npm publish --access public
"""

[tasks."publish:eslint"]
description = "Publish eslint-plugin-svelte-gym to npm"
run = "cd eslint-plugin && npm publish --access public"

[tasks."publish:all"]
description = "Publish both packages to npm"
depends = ["publish", "publish:eslint"]

[tasks."dev:v4"]
description = "Start development server for Svelte 4 test project"
dir = "test-v4-project"
run = "pnpm run dev"
